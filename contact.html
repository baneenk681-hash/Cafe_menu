<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPink PC | طلب تجميعة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff5f5;
            color: #2b2d42;
            text-align: center;
        }
        header {
            background-color: #4a4e69;
            color: white;
            padding: 20px;
            border-bottom: 4px solid #ffb5a7;
        }
        nav a {
            color: #f7d6d0;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: white;
        }
        .container {
            max-width: 650px;
            margin: 30px auto;
            padding: 25px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        h1 {
            color: #4a4e69;
        }
        .info-box {
            background-color: #fff0f3;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: right;
            line-height: 1.8;
            border-right: 4px solid #ffb5a7;
        }
        form {
            display: flex;
            flex-direction: column;
            text-align: right;
        }
        label {
            margin-top: 15px;
            font-weight: bold;
            color: #4a4e69;
        }
        input, textarea, select {
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ffcbd7;
            border-radius: 8px;
            font-family: inherit;
            background-color: #fffafb;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ffb5a7;
            box-shadow: 0 0 5px rgba(255, 181, 167, 0.5);
        }
        .btn-submit {
            background-color: #4a4e69;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(74, 78, 105, 0.2);
        }
        .btn-submit:hover {
            background-color: #ffb5a7;
            color: #4a4e69;
        }
        footer {
            background-color: #4a4e69;
            color: white;
            padding: 15px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h2>🖥️ CyberPink PC Hub</h2>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="menu.html">مواصفات التجميعات</a>
            <a href="contact.html">طلب تجميعة خاصة</a>
        </nav>
    </header>

    <div class="container">
        <h1>📞 استشارات وهندسة التجميعات</h1>
        <p>أرسلي لنا ميزانيتكِ وطبيعة عملكِ وسنقوم بتصميم حاسوب أحلامكِ</p>

        <div class="info-box">
            📍 <b>مقر المختبر الرقمي:</b> جامعة كربلاء، كلية تكنولوجيا المعلومات.<br>
            📧 <b>الدعم الفني التقني:</b> support@cyberpinkpc.com
        </div>

        <form onsubmit="alert('تم استلام مواصفاتك بنجاح! سيقوم مهندسو العتاد بمراجعة الطلب.'); return false;">
            <label for="name">الاسم الكريم:</label>
            <input type="text" id="name" required placeholder="اكتبِ اسمكِ هنا">

            <label for="usage">استخدامكِ الأساسي للحاسوب:</label>
            <select id="usage">
                <option>ألعاب وبرمجة عامة (Gaming & Dev)</option>
                <option>هندسة برمجيات وأنظمة وهمية (Docker & Virtualization)</option>
                <option>ذكاء اصطناعي وتحليل بيانات (AI & Machine Learning)</option>
            </select>

            <label for="budget">الميزانية التقريبية المرصودة:</label>
            <input type="text" id="budget" required placeholder="مثلاً: 1200 دولار">
            <label for="message">ملاحظات إضافية (ألوان معينة، ماركة تفضلينها):</label>
            <textarea id="message" rows="4" placeholder="اكتبِ مواصفاتكِ الخاصة هنا..."></textarea>

            <button type="submit" class="btn-submit">إرسال طلب التجميعة 📥</button>
        </form>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة © 2026</p>
    </footer>

</body>
</html>
